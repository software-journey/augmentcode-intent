name: CI

on:
  push:
    branches:
      - main
      - sore-harrier
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/jwt-workshop/starter-api
    env:
      DATABASE_URL: file:./ci.db
      JWT_SECRET: ci-wave-7-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: 3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/jwt-workshop/starter-api/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npm run typecheck
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/delivery-dashboard/starter-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/delivery-dashboard/starter-app/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build